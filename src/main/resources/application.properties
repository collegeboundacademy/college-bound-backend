server.port=8080

# GitHub OAuth
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/user_management}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.defer-datasource-initialization=true

# College Scorecard API key from environment
college.scorecard.api-key=${COLLEGE_SCORECARD_API_KEY:}

# Frontend + CORS settings for local/dev/prod deployment
app.frontend.url=${FRONTEND_URL:http://localhost:4001}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4000,http://127.0.0.1:4000,http://localhost:4001,http://127.0.0.1:4001,https://pages.opencodingsociety.com}

# Local CSV dataset path (default bundled file)
college.csv.path=${COLLEGE_CSV_PATH:classpath:data/colleges.csv}

# Data source mode: csv | api | auto
college.data.source=${COLLEGE_DATA_SOURCE:api}