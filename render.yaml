services:
  - type: web
    name: college-bound-backend
    runtime: java
    plan: free
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -Dserver.port=$PORT -jar target/*.jar
    healthCheckPath: /api/colleges/search?limit=1
    envVars:
      - key: COLLEGE_SCORECARD_API_KEY
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: college-bound-postgres
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: college-bound-postgres
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: college-bound-postgres
          property: password
      - key: FRONTEND_URL
        value: https://pages.opencodingsociety.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://pages.opencodingsociety.com
      - key: COLLEGE_DATA_SOURCE
        value: api

  - type: pserv
    name: college-bound-postgres
    plan: free
